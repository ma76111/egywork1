services:
  postgres:
    image: postgres:16-alpine
    container_name: egywork-postgres
    restart: always
    environment:
      POSTGRES_DB: egywork
      POSTGRES_USER: egywork
      POSTGRES_PASSWORD: egywork_pass
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U egywork"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: egywork-backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 5000
      DATABASE_URL: postgres://egywork:egywork_pass@postgres:5432/egywork
      JWT_SECRET: egywork_egypt_2026_super_secret
      SMTP_HOST: smtp.gmail.com
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME}
      APP_URL: ${APP_URL}

  frontend:
    build: ./frontend
    container_name: egywork-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pg_data:
